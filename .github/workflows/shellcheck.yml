name: shellcheck
permissions: {}
on: pull_request
jobs:

  build:
    name: Run shellcheck
    runs-on: ubuntu-latest
    steps:

    - name: Check out code
      uses: actions/checkout@v6

    - name: Run checks
      run: |
        shellcheck --version
        overall_rc=0
        while IFS= read -r -d '' f; do
          rc=0
          echo "CHECKING $f"
          shellcheck -S error -e SC1091 "$f" || rc=$?
          echo "exit=$rc file=$f"
          if [ "$rc" -ne 0 ]; then
            overall_rc="$rc"
          fi
        done < <(find . \( -path './tests/*.sh' -o -path './tests/*/*.sh' \) -print0)
        exit "$overall_rc"
